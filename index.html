<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Arial; padding: 30px; }
button {
  width: 100%;
  padding: 20px;
  font-size: 24px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
}
.auto { background: #4CAF50; color: white; }
.normal { background: #2196F3; color: white; }
.fase1 { background: #FF9800; color: white; }
.fase2 { background: #f44336; color: white; }
</style>
</head>

<body>

<h2 id="estado">Cargando...</h2>
<h3 id="estadoReglas">Sin cambios</h3>

<button class="auto" onclick="setModo('auto')">AUTO</button>
<button class="normal" onclick="setModo('normal')">NORMAL</button>
<button class="fase1" onclick="setModo('fase1')">FASE 1</button>
<button class="fase2" onclick="setModo('fase2')">FASE 2</button>

<h3>Hoy (por holograma)</h3>

<button onclick="setHoyHolo('1','pares')">H1 PARES</button>
<button onclick="setHoyHolo('1','nones')">H1 NONES</button>
<button onclick="setHoyHolo('1','todos')">H1 TODOS</button>

<button onclick="setHoyHolo('00','pares')">H00 PARES</button>
<button onclick="setHoyHolo('00','nones')">H00 NONES</button>
<button onclick="setHoyHolo('00','todos')">H00 TODOS</button>

<button onclick="setHoyHolo('2','todos')">H2 TODOS</button>

<br><br>

<button onclick="resetHoy()">🔄 RESET HOY</button>

<h3>Mañana (por holograma)</h3>

<button onclick="setMananaHolo('1','pares')">H1 PARES</button>
<button onclick="setMananaHolo('1','nones')">H1 NONES</button>
<button onclick="setMananaHolo('1','todos')">H1 TODOS</button>

<button onclick="setMananaHolo('00','pares')">H00 PARES</button>
<button onclick="setMananaHolo('00','nones')">H00 NONES</button>
<button onclick="setMananaHolo('00','todos')">H00 TODOS</button>

<button onclick="setMananaHolo('2','todos')">H2 TODOS</button>

<br><br>

<button onclick="resetManana()">🔄 RESET MAÑANA</button>

<h3>Control Sábado</h3>

<button onclick="setSabado('1','pares')">H1 PARES</button>
<button onclick="setSabado('1','nones')">H1 NONES</button>
<button onclick="setSabado('1','todos')">H1 TODOS</button>

<button onclick="setSabado('00','pares')">H00 PARES</button>
<button onclick="setSabado('00','nones')">H00 NONES</button>
<button onclick="setSabado('00','todos')">H00 TODOS</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC8hr-0WUNpz62rfkAVCzpozH5on-kVjuU",
    authDomain: "circula-bfb35.firebaseapp.com",
    projectId: "circula-bfb35",
    storageBucket: "circula-bfb35.firebasestorage.app",
    messagingSenderId: "742771705055",
    appId: "1:742771705055:web:027f7b88088ef5f315956a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let passwordIngresada = "";

  function pedirPassword() {
    const pass = prompt("🔐 Ingresa la clave:");

    if (!pass) {
      alert("❌ Cancelado");
      return;
    }

    passwordIngresada = pass.trim();
    cargarModo();
  }

  async function setModo(modo) {
    if (!passwordIngresada) {
      alert("🔒 Ingresa la clave primero");
      return;
    }

    try {
      await setDoc(doc(db, "config", "restricciones"), {
        modo: modo,
        password: passwordIngresada
      }, { merge: true });

      cargarModo();

    } catch (e) {
      alert("❌ Clave incorrecta");
    }
  }

  async function setHoy(tipo) {
  await setDoc(doc(db, "config", "restricciones"), {
    restricciones: {
      hoy: { tipo: tipo }
    }
  }, { merge: true });

  document.getElementById("estadoReglas").innerText = "Hoy: " + tipo;
}

  async function setManana(tipo) {
  await setDoc(doc(db, "config", "restricciones"), {
    restricciones: {
      manana: { tipo: tipo }
    }
  }, { merge: true });

  document.getElementById("estadoReglas").innerText = "Mañana: " + tipo;
}

  async function setSabado(holo, tipo) {
  await setDoc(doc(db, "config", "restricciones"), {
    sabado: {
      [holo]: { tipo: tipo }
    }
  }, { merge: true });

  document.getElementById("estadoReglas").innerText = "Sábado " + holo + ": " + tipo;
}
async function setHoyHolo(holo, tipo) {
  await setDoc(doc(db, "config", "restricciones"), {
    restricciones: {
      hoy: {
        [holo]: { tipo: tipo }
      }
    }
  }, { merge: true });

  document.getElementById("estadoReglas").innerText =
    "Hoy " + holo + ": " + tipo;
}

async function resetHoy() {
  await setDoc(doc(db, "config", "restricciones"), {
    restricciones: {
      hoy: null
    }
  }, { merge: true });

  document.getElementById("estadoReglas").innerText =
    "Hoy reset (auto)";
}

  async function setMananaHolo(holo, tipo) {
  await setDoc(doc(db, "config", "restricciones"), {
    restricciones: {
      manana: {
        [holo]: { tipo: tipo }
      }
    }
  }, { merge: true });

  document.getElementById("estadoReglas").innerText =
    "Mañana " + holo + ": " + tipo;
}

async function resetManana() {
  await setDoc(doc(db, "config", "restricciones"), {
    restricciones: {
      manana: null
    }
  }, { merge: true });

  document.getElementById("estadoReglas").innerText =
    "Mañana reset";
}
  async function cargarModo() {
    const docSnap = await getDoc(doc(db, "config", "restricciones"));

    const modo = docSnap.exists() ? docSnap.data().modo : "auto";

    document.getElementById("estado").innerText = "Modo actual: " + modo;
  }

  window.setModo = setModo;
  window.setHoyHolo = setHoyHolo;
  window.resetHoy = resetHoy;
  window.setMananaHolo = setMananaHolo;
  window.resetManana = resetManana;

  window.setHoy = setHoy;
  window.setManana = setManana;
  window.setSabado = setSabado;
  pedirPassword();

  setInterval(cargarModo, 3000);
</script>

</body>
</html>
