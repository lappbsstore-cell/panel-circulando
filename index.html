<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; padding: 30px; }

button {
  width: 100%;
  padding: 20px;
  font-size: 20px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  transition: 0.2s;
}

.auto { background: #4CAF50; color: white; }
.normal { background: #2196F3; color: white; }
.fase1 { background: #FF9800; color: white; }
.fase2 { background: #f44336; color: white; }

.activo {
  background: #2ecc71 !important;
  color: white;
  font-weight: bold;
  transform: scale(0.97);
}
</style>
</head>

<body>

<h2 id="estado">Cargando...</h2>
<h3 id="estadoReglas">Sin cambios</h3>

<button class="auto" data-modo="auto" onclick="setModo('auto')">AUTO</button>
<button class="normal" data-modo="normal" onclick="setModo('normal')">NORMAL</button>
<button class="fase1" data-modo="fase1" onclick="setModo('fase1')">FASE 1</button>
<button class="fase2" data-modo="fase2" onclick="setModo('fase2')">FASE 2</button>

<h3>Hoy</h3>

<button data-dia="hoy" data-holo="00" data-tipo="pares" onclick="setHoyHolo('00','pares')">H00 PARES</button>
<button data-dia="hoy" data-holo="00" data-tipo="nones" onclick="setHoyHolo('00','nones')">H00 NONES</button>
<button data-dia="hoy" data-holo="00" data-tipo="todos" onclick="setHoyHolo('00','todos')">H00 TODOS</button>

<button data-dia="hoy" data-holo="0" data-tipo="pares" onclick="setHoyHolo('0','pares')">H0 PARES</button>
<button data-dia="hoy" data-holo="0" data-tipo="nones" onclick="setHoyHolo('0','nones')">H0 NONES</button>
<button data-dia="hoy" data-holo="0" data-tipo="todos" onclick="setHoyHolo('0','todos')">H0 TODOS</button>

<button data-dia="hoy" data-holo="1" data-tipo="pares" onclick="setHoyHolo('1','pares')">H1 PARES</button>
<button data-dia="hoy" data-holo="1" data-tipo="nones" onclick="setHoyHolo('1','nones')">H1 NONES</button>
<button data-dia="hoy" data-holo="1" data-tipo="todos" onclick="setHoyHolo('1','todos')">H1 TODOS</button>

<button data-dia="hoy" data-holo="2" data-tipo="todos" onclick="setHoyHolo('2','todos')">H2 TODOS</button>

<button onclick="resetHoy()">🔄 RESET HOY</button>

<h3>Mañana</h3>

<button data-dia="manana" data-holo="00" data-tipo="pares" onclick="setMananaHolo('00','pares')">H00 PARES</button>
<button data-dia="manana" data-holo="00" data-tipo="nones" onclick="setMananaHolo('00','nones')">H00 NONES</button>
<button data-dia="manana" data-holo="00" data-tipo="todos" onclick="setMananaHolo('00','todos')">H00 TODOS</button>

<button data-dia="manana" data-holo="0" data-tipo="pares" onclick="setMananaHolo('0','pares')">H0 PARES</button>
<button data-dia="manana" data-holo="0" data-tipo="nones" onclick="setMananaHolo('0','nones')">H0 NONES</button>
<button data-dia="manana" data-holo="0" data-tipo="todos" onclick="setMananaHolo('0','todos')">H0 TODOS</button>

<button data-dia="manana" data-holo="1" data-tipo="pares" onclick="setMananaHolo('1','pares')">H1 PARES</button>
<button data-dia="manana" data-holo="1" data-tipo="nones" onclick="setMananaHolo('1','nones')">H1 NONES</button>
<button data-dia="manana" data-holo="1" data-tipo="todos" onclick="setMananaHolo('1','todos')">H1 TODOS</button>

<button data-dia="manana" data-holo="2" data-tipo="todos" onclick="setMananaHolo('2','todos')">H2 TODOS</button>

<button onclick="resetManana()">🔄 RESET MAÑANA</button>

<h3>Historial</h3>
<div id="historial" style="font-size:14px;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "circula-bfb35.firebaseapp.com",
  projectId: "circula-bfb35",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let passwordIngresada = "";

function pedirPassword() {
  const pass = prompt("🔐 Ingresa la clave:");
  if (!pass) return;
  passwordIngresada = pass.trim();
  cargarModo();
}

async function setModo(modo) {
  await setDoc(doc(db, "config", "restricciones"), {
    modo: modo,
    password: passwordIngresada
  }, { merge: true });
await guardarHistorial({
  tipo: "modo",
  valor: modo
});

  await guardarHistorial({
  tipo: "modo",
  valor: modo
});
  
  cargarModo();
}
async function guardarHistorial(accion) {
  const ref = doc(db, "config", "restricciones");
  const snap = await getDoc(ref);

  let data = snap.exists() ? snap.data() : {};
  let historial = data.historial || [];

  historial.unshift({
    ...accion,
    fecha: new Date().toLocaleString()
  });

  historial = historial.slice(0, 50);

  await setDoc(ref, { historial }, { merge: true });
}
async function setHoyHolo(holo, tipo) {
  const ref = doc(db, "config", "restricciones");
  const snap = await getDoc(ref);

  let data = snap.exists() ? snap.data() : {};
  let restricciones = data.restricciones || {};
  let hoy = restricciones.hoy || {};

  if (hoy[holo] && hoy[holo].tipo === tipo) {
    delete hoy[holo];
  } else {
    hoy[holo] = { tipo };
  }

  await setDoc(ref, {
    restricciones: { ...restricciones, hoy }
  }, { merge: true });
 // 🔥 👇 AQUÍ VA ESTO
  await guardarHistorial({
    tipo: "hoy",
    holograma: holo,
    valor: tipo
  });
  renderBotones();
}

async function setMananaHolo(holo, tipo) {
  const ref = doc(db, "config", "restricciones");
  const snap = await getDoc(ref);

  let data = snap.exists() ? snap.data() : {};
  let restricciones = data.restricciones || {};
  let manana = restricciones.manana || {};

  if (manana[holo] && manana[holo].tipo === tipo) {
    delete manana[holo];
  } else {
    manana[holo] = { tipo };
  }

  await setDoc(ref, {
    restricciones: { ...restricciones, manana }
  }, { merge: true });

  await guardarHistorial({
  tipo: "mañana",
  holograma: holo,
  valor: tipo
});
  renderBotones();
}

async function resetHoy() {
  await setDoc(doc(db, "config", "restricciones"), {
    restricciones: { hoy: null }
  }, { merge: true });

await guardarHistorial({
  tipo: "reset",
  valor: "hoy"
});
  
  renderBotones();
}

async function resetManana() {
  await setDoc(doc(db, "config", "restricciones"), {
    restricciones: { manana: null }
  }, { merge: true });

await guardarHistorial({
  tipo: "reset",
  valor: "mañana"
});
  
  renderBotones();
}

async function cargarModo() {
  const snap = await getDoc(doc(db, "config", "restricciones"));

  if (!snap.exists()) return;

  const data = snap.data();
  document.getElementById("estado").innerText = "Modo actual: " + (data.modo || "auto");

  renderBotones();
  renderHistorial(); // 🔥 ESTA LÍNEA LA AGREGAS
}

async function renderBotones() {
  const snap = await getDoc(doc(db, "config", "restricciones"));
  if (!snap.exists()) return;

  const data = snap.data();
  const restricciones = data.restricciones || {};

  document.querySelectorAll("button[data-dia]").forEach(btn => {
    const dia = btn.dataset.dia;
    const holo = btn.dataset.holo;
    const tipo = btn.dataset.tipo;

    const activo = restricciones?.[dia]?.[holo]?.tipo === tipo;

    btn.classList.toggle("activo", activo);
  });
  // 🔥 pintar modo activo
const modoActual = data.modo || "auto";

document.querySelectorAll("button[data-modo]").forEach(btn => {
  if (btn.dataset.modo === modoActual) {
    btn.classList.add("activo");
  } else {
    btn.classList.remove("activo");
  }
});
}

async function renderHistorial() {
  const snap = await getDoc(doc(db, "config", "restricciones"));

  if (!snap.exists()) return;

  const data = snap.data();
  const historial = data.historial || [];

  const div = document.getElementById("historial");

  if (!historial.length) {
    div.innerHTML = "Sin movimientos aún";
    return;
  }

  div.innerHTML = historial.map(h => `
    <div style="margin-bottom:6px;">
      🕒 ${h.fecha} — ${h.tipo} ${h.holograma || ""} ${h.valor}
    </div>
  `).join("");
}

  
window.setModo = setModo;
window.setHoyHolo = setHoyHolo;
window.setMananaHolo = setMananaHolo;
window.resetHoy = resetHoy;
window.resetManana = resetManana;

pedirPassword();

setTimeout(() => {
  renderHistorial();
}, 1000);

setInterval(cargarModo, 3000);
</script>

</body>
</html>
