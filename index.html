async function setMananaColor(event, holo, color) {
console.log("CLICK MAÑANA COLOR", holo, color);
  // 🔥 ACTIVAR VISUAL (igual que HOY)
  const botones = document.querySelectorAll(
    `button[data-dia="manana"][data-holo="${holo}"][data-color="${color}"]`
  );

  botones.forEach(btn => {
    btn.classList.toggle("activo");
  });

  const ref = doc(db, "config", "restricciones");
  const snap = await getDoc(ref);

  let data = snap.exists() ? snap.data() : {};
  let restricciones = data.restricciones || {};
  let manana = restricciones.manana || {};

  let actual = manana[holo];

  if (!actual) {
    actual = { tipo: "color", colores: [] };
  }

  if (!actual.colores) actual.colores = [];

  if (actual.colores.includes(color)) {
    actual.colores = actual.colores.filter(c => c !== color);
  } else {
    actual.colores.push(color);
  }

  manana[holo] = actual;

  await setDoc(ref, {
    restricciones: {
      ...restricciones,
      manana
    }
  }, { merge: true });

  await guardarHistorial({
  tipo: "mañana",
  holograma: holo,
  valor: color
});

  renderBotones();
}
  

async function guardarHistorial(accion) {
  const ref = doc(db, "config", "restricciones");
  const snap = await getDoc(ref);

  let data = snap.exists() ? snap.data() : {};
  let historial = data.historial || [];

  historial.unshift({
    ...accion,
    fecha: new Date().toLocaleString()
  });

  historial = historial.slice(0, 50);

  await setDoc(ref, { historial }, { merge: true });
}

function generarResumen(restricciones) {
  function generarTexto(diaData, label, color) {
    if (!diaData || Object.keys(diaData).length === 0) {
      return `<div style="color:${color}">${label}: automático</div>`;
    }

    const partes = Object.entries(diaData).map(([holo, val]) => {
  if (val.tipo === "color" && val.colores?.length) {
    return `H${holo} ${val.colores.join(", ")}`;
  }
  return `H${holo} ${val.tipo}`;
});

    return `<div style="color:${color}">${label}: ${partes.join(", ")}</div>`;
  }

  const hoy = generarTexto(restricciones?.hoy, "Hoy", "#2196F3");
  const mananaTexto =
  generarTexto(
    restricciones?.manana,
    "Mañana",
    "#9C27B0"
  );

return hoy + mananaTexto;
}

  
async function renderBotones() {
  const snap = await getDoc(doc(db, "config", "restricciones"));
  if (!snap.exists()) return;

  const data = snap.data();
  const restricciones = data.restricciones || {};

  document.querySelectorAll("button[data-dia]").forEach(btn => {
    const dia = btn.dataset.dia;
    const holo = btn.dataset.holo;
    const tipo = btn.dataset.tipo;

   const regla = restricciones?.[dia]?.[holo];

let activo = false;

const color = btn.dataset.color;

if (tipo === "color") {
  activo = regla?.tipo === "color" && regla?.colores?.includes(color);
} else {
  activo = regla?.tipo === tipo;
}
    btn.classList.toggle("activo", activo);
  });

  
  // 🔥 resumen (UNA SOLA VEZ)
  const resumen = generarResumen(restricciones);
  document.getElementById("resumenHoy").innerHTML = resumen;


  
}

async function renderHistorial() {
  const snap = await getDoc(doc(db, "config", "restricciones"));

  if (!snap.exists()) return;

  const data = snap.data();
  const historial = data.historial || [];

  const div = document.getElementById("historial");

  if (!historial.length) {
    div.innerHTML = "Sin movimientos aún";
    return;
  }

  function colorPorTipo(tipo) {
    if (tipo === "modo") return "#FF9800";      // naranja
    if (tipo === "hoy") return "#2196F3";       // azul
    if (tipo === "mañana") return "#9C27B0";    // morado
    if (tipo === "reset") return "#f44336";     // rojo
    return "#555";
  }

  div.innerHTML = historial.map(h => {
    const color = colorPorTipo(h.tipo);

    return `
      <div style="margin-bottom:6px; color:${color}">
        🕒 ${h.fecha} — ${h.tipo} ${h.holograma || ""} ${h.valor}
      </div>
    `;
  }).join("");
}
