<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; padding: 30px; }

button {
  width: 100%;
  padding: 20px;
  font-size: 20px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  transition: 0.2s;
}

.auto { background: #4CAF50; color: white; }
.normal { background: #2196F3; color: white; }
.fase1 { background: #FF9800; color: white; }
.fase2 { background: #f44336; color: white; }

.activo {
  background: #2ecc71 !important;
  color: white;
  font-weight: bold;
  transform: scale(0.97);
}
</style>
</head>

<body>

<h2 id="estado">Cargando...</h2>
<h3 id="estadoReglas">Sin cambios</h3>
<div id="resumenHoy" style="font-size:16px; margin-bottom:10px;"></div>

<button class="auto" data-modo="auto" onclick="setModo('auto')">AUTO</button>
<button class="normal" data-modo="normal" onclick="setModo('normal')">NORMAL</button>
<button class="fase1" data-modo="fase1" onclick="setModo('fase1')">FASE 1</button>
<button class="fase2" data-modo="fase2" onclick="setModo('fase2')">FASE 2</button>

<h3>Hoy</h3>

<button data-dia="hoy" data-holo="00" data-tipo="pares" onclick="setHoyHolo('00','pares')">H00 PARES</button>
<button data-dia="hoy" data-holo="00" data-tipo="nones" onclick="setHoyHolo('00','nones')">H00 NONES</button>
<button data-dia="hoy" data-holo="00" data-tipo="todos" onclick="setHoyHolo('00','todos')">H00 TODOS</button>
  <button 
  data-dia="hoy" 
  data-holo="00" 
  data-tipo="color"
  data-color="amarillo"
  onclick="setHoyColor('00','amarillo')">
🟡 H00 AMARILLO
</button>

  <button 
  data-dia="hoy" 
  data-holo="00" 
  data-tipo="color"
  data-color="rosa"
  onclick="setHoyColor('00','rosa')">
🌸 H00 ROSA
</button>

<button 
  data-dia="hoy" 
  data-holo="00" 
  data-tipo="color"
  data-color="rojo"
  onclick="setHoyColor('00','rojo')">
🔴 H00 ROJO
</button>

<button 
  data-dia="hoy" 
  data-holo="00" 
  data-tipo="color"
  data-color="verde"
  onclick="setHoyColor('00','verde')">
🟢 H00 VERDE
</button>

<button 
  data-dia="hoy" 
  data-holo="00" 
  data-tipo="color"
  data-color="azul"
  onclick="setHoyColor('00','azul')">
🔵 H00 AZUL
</button>

<button data-dia="hoy" data-holo="0" data-tipo="pares" onclick="setHoyHolo('0','pares')">H0 PARES</button>
<button data-dia="hoy" data-holo="0" data-tipo="nones" onclick="setHoyHolo('0','nones')">H0 NONES</button>
<button data-dia="hoy" data-holo="0" data-tipo="todos" onclick="setHoyHolo('0','todos')">H0 TODOS</button>

<button data-dia="hoy" data-holo="1" data-tipo="pares" onclick="setHoyHolo('1','pares')">H1 PARES</button>
<button data-dia="hoy" data-holo="1" data-tipo="nones" onclick="setHoyHolo('1','nones')">H1 NONES</button>
<button data-dia="hoy" data-holo="1" data-tipo="todos" onclick="setHoyHolo('1','todos')">H1 TODOS</button>

<button data-dia="hoy" data-holo="2" data-tipo="todos" onclick="setHoyHolo('2','todos')">H2 TODOS</button>

<button onclick="resetHoy()">🔄 RESET HOY</button>


<h3>Mañana</h3>


<button data-dia="manana" data-holo="00" data-tipo="pares" onclick="setMananaHolo('00','pares')">H00 PARES</button>
<button data-dia="manana" data-holo="00" data-tipo="nones" onclick="setMananaHolo('00','nones')">H00 NONES</button>
<button data-dia="manana" data-holo="00" data-tipo="todos" onclick="setMananaHolo('00','todos')">H00 TODOS</button>

<button data-dia="manana" data-holo="0" data-tipo="pares" onclick="setMananaHolo('0','pares')">H0 PARES</button>
<button data-dia="manana" data-holo="0" data-tipo="nones" onclick="setMananaHolo('0','nones')">H0 NONES</button>
<button data-dia="manana" data-holo="0" data-tipo="todos" onclick="setMananaHolo('0','todos')">H0 TODOS</button>

<button data-dia="manana" data-holo="1" data-tipo="pares" onclick="setMananaHolo('1','pares')">H1 PARES</button>
<button data-dia="manana" data-holo="1" data-tipo="nones" onclick="setMananaHolo('1','nones')">H1 NONES</button>
<button data-dia="manana" data-holo="1" data-tipo="todos" onclick="setMananaHolo('1','todos')">H1 TODOS</button>

<button data-dia="manana" data-holo="2" data-tipo="todos" onclick="setMananaHolo('2','todos')">H2 TODOS</button>



<button onclick="resetManana()">🔄 RESET MAÑANA</button>

<h3>Configurar Fase 1</h3>

<button data-fase1="00-pares" onclick="setFase1('00','pares')">H00 PARES</button>
<button data-fase1="00-nones" onclick="setFase1('00','nones')">H00 NONES</button>
<button data-fase1="00-todos" onclick="setFase1('00','todos')">H00 TODOS</button>

<button data-fase1="0-pares" onclick="setFase1('0','pares')">H0 PARES</button>
<button data-fase1="0-nones" onclick="setFase1('0','nones')">H0 NONES</button>
<button data-fase1="0-todos" onclick="setFase1('0','todos')">H0 TODOS</button>

<button data-fase1="1-pares" onclick="setFase1('1','pares')">H1 PARES</button>
<button data-fase1="1-nones" onclick="setFase1('1','nones')">H1 NONES</button>
<button data-fase1="1-todos" onclick="setFase1('1','todos')">H1 TODOS</button>

<button data-fase1="2-todos" onclick="setFase1('2','todos')">H2 TODOS</button>

<button data-guardar-fase1 onclick="guardarFase1Config()" style="background:#FF9800;color:white;">
  💾 Guardar Fase 1
</button>
  
<button data-accion="anunciar" onclick="anunciarFase1Manana()" style="background:#FF9800;color:white;">
  📢 Anunciar Fase 1 mañana
</button>

<button onclick="cancelarManana()" style="background:#4CAF50;color:white;">
  ❌ Cancelar contingencia mañana
</button>

<h3>Historial</h3>
<button onclick="limpiarHistorial()" style="background:#555;color:white;">
  🧹 Limpiar historial
</button>
<div id="historial" style="font-size:14px;"></div>

<style>
<style>
.btn-activo {
  outline: 3px solid #00ff00;
  box-shadow: 0 0 10px #00ff00;
  opacity: 0.8;
}
</style>
  
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "circula-bfb35.firebaseapp.com",
  projectId: "circula-bfb35",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let passwordIngresada = "";

function pedirPassword() {
  const pass = prompt("🔐 Ingresa la clave:");
  if (!pass) return;
  passwordIngresada = pass.trim();
  cargarModo();
}

async function setModo(modo) {
  await setDoc(doc(db, "config", "restricciones"), {
    modo: modo,
    password: passwordIngresada
  }, { merge: true });


  await guardarHistorial({
  tipo: "modo",
  valor: modo
});
  
  cargarModo();
}
async function guardarHistorial(accion) {
  const ref = doc(db, "config", "restricciones");
  const snap = await getDoc(ref);

  let data = snap.exists() ? snap.data() : {};
  let historial = data.historial || [];

  historial.unshift({
    ...accion,
    fecha: new Date().toLocaleString()
  });

  historial = historial.slice(0, 50);

  await setDoc(ref, { historial }, { merge: true });
}
async function setHoyHolo(holo, tipo) {
  const ref = doc(db, "config", "restricciones");
  const snap = await getDoc(ref);

  let data = snap.exists() ? snap.data() : {};
  let restricciones = data.restricciones || {};
  let hoy = restricciones.hoy || {};

  if (hoy[holo] && hoy[holo].tipo === tipo) {
    delete hoy[holo];
  } else {
    hoy[holo] = { tipo };
  }

  await setDoc(ref, {
    restricciones: { ...restricciones, hoy }
  }, { merge: true });
 // 🔥 👇 AQUÍ VA ESTO
  await guardarHistorial({
    tipo: "hoy",
    holograma: holo,
    valor: tipo
  });
  renderBotones();
}

  async function setHoyColor(holo, color) {
  const ref = doc(db, "config", "restricciones");
  const snap = await getDoc(ref);

  let data = snap.exists() ? snap.data() : {};

  // asegurar estructura
  if (!data.restricciones) data.restricciones = {};
  if (!data.restricciones.hoy) data.restricciones.hoy = {};

  let actual = data.restricciones.hoy[holo];

  // si no existe, crear nuevo
  if (!actual) {
    actual = {
      tipo: "color",
      colores: []
    };
  }

  if (!actual.colores) {
    actual.colores = [];
  }

  // 🔁 toggle
  if (actual.colores.includes(color)) {
    actual.colores = actual.colores.filter(c => c !== color);
  } else {
    actual.colores.push(color);
  }

  // guardar
  data.restricciones.hoy[holo] = actual;

  await setDoc(ref, data, { merge: true });

  console.log("🔥 COLORES:", actual.colores);

    // 🔥 toggle visual del botón
const botones = document.querySelectorAll(
  `button[data-dia="hoy"][data-holo="${holo}"][data-color="${color}"]`
);

botones.forEach(btn => {
  btn.classList.toggle("btn-activo");
});
}

async function setMananaHolo(holo, tipo) {
  const ref = doc(db, "config", "restricciones");
  const snap = await getDoc(ref);

  let data = snap.exists() ? snap.data() : {};
  let restricciones = data.restricciones || {};
  let manana = restricciones.manana || {};

  if (manana[holo] && manana[holo].tipo === tipo) {
    delete manana[holo];
  } else {
    manana[holo] = { tipo };
  }

  await setDoc(ref, {
    restricciones: { ...restricciones, manana }
  }, { merge: true });

  await guardarHistorial({
  tipo: "mañana",
  holograma: holo,
  valor: tipo
});
  renderBotones();
}

async function resetHoy() {
  await setDoc(doc(db, "config", "restricciones"), {
    restricciones: { hoy: null }
  }, { merge: true });

await guardarHistorial({
  tipo: "reset",
  valor: "hoy"
});
  
  renderBotones();
}

async function resetManana() {
  await setDoc(doc(db, "config", "restricciones"), {
    restricciones: { manana: null }
  }, { merge: true });

await guardarHistorial({
  tipo: "reset",
  valor: "mañana"
});
  
  renderBotones();
}

async function cargarModo() {
  const snap = await getDoc(doc(db, "config", "restricciones"));

  if (!snap.exists()) return;

  const data = snap.data();
  document.getElementById("estado").innerText = "Modo actual: " + (data.modo || "auto");

  renderBotones();
  renderHistorial(); // 🔥 ESTA LÍNEA LA AGREGAS
  
}

function generarResumen(restricciones) {
  function generarTexto(diaData, label, color) {
    if (!diaData || Object.keys(diaData).length === 0) {
      return `<div style="color:${color}">${label}: automático</div>`;
    }

    const partes = Object.entries(diaData).map(([holo, val]) => {
      return `H${holo} ${val.tipo}`;
    });

    return `<div style="color:${color}">${label}: ${partes.join(", ")}</div>`;
  }

  const hoy = generarTexto(restricciones?.hoy, "Hoy", "#2196F3");
  let mananaTexto;

if (esFase1Manana(restricciones)) {
  mananaTexto = `<div style="color:#9C27B0">Mañana: Fase 1 (Panel)</div>`;
} else {
  mananaTexto = generarTexto(restricciones?.manana, "Mañana", "#9C27B0");
}

  return hoy + mananaTexto;
}
function esFase1Manana(restricciones) {
  const manana = restricciones?.manana;

  if (!manana) return false;

  return (
    manana["0"]?.tipo === "todos" &&
    manana["1"]?.tipo === "pares"
  );
}
  
async function renderBotones() {
  const snap = await getDoc(doc(db, "config", "restricciones"));
  if (!snap.exists()) return;

  const data = snap.data();
  const restricciones = data.restricciones || {};

  document.querySelectorAll("button[data-dia]").forEach(btn => {
    const dia = btn.dataset.dia;
    const holo = btn.dataset.holo;
    const tipo = btn.dataset.tipo;

    const regla = restricciones?.[dia]?.[holo];

let activo = false;

const color = btn.dataset.color;

if (tipo === "color") {
  activo = regla?.tipo === "color" && regla?.color === color;
} else {
  activo = regla?.tipo === tipo;
}
    btn.classList.toggle("activo", activo);
  });

  // 🔥 modo activo
  const modoActual = data.modo || "auto";

  document.querySelectorAll("button[data-modo]").forEach(btn => {
    if (btn.dataset.modo === modoActual) {
      btn.classList.add("activo");
    } else {
      btn.classList.remove("activo");
    }
  });

  // 🔥 resumen (UNA SOLA VEZ)
  const resumen = generarResumen(restricciones);
  document.getElementById("resumenHoy").innerHTML = resumen;

// 🔥 detectar si mañana es fase 1 (PROTEGIDO)
try {
  const manana = data.restricciones?.manana || {};

  const esFase1 =
    manana["0"]?.tipo === "todos" &&
    manana["1"]?.tipo === "pares";

  document.querySelectorAll("[data-accion='anunciar']").forEach(btn => {
    btn.classList.toggle("activo", esFase1);
  });

} catch (e) {
  console.log("Error en detección de fase1:", e);
}
  
}

async function renderHistorial() {
  const snap = await getDoc(doc(db, "config", "restricciones"));

  if (!snap.exists()) return;

  const data = snap.data();
  const historial = data.historial || [];

  const div = document.getElementById("historial");

  if (!historial.length) {
    div.innerHTML = "Sin movimientos aún";
    return;
  }

  function colorPorTipo(tipo) {
    if (tipo === "modo") return "#FF9800";      // naranja
    if (tipo === "hoy") return "#2196F3";       // azul
    if (tipo === "mañana") return "#9C27B0";    // morado
    if (tipo === "reset") return "#f44336";     // rojo
    return "#555";
  }

  div.innerHTML = historial.map(h => {
    const color = colorPorTipo(h.tipo);

    return `
      <div style="margin-bottom:6px; color:${color}">
        🕒 ${h.fecha} — ${h.tipo} ${h.holograma || ""} ${h.valor}
      </div>
    `;
  }).join("");
}

// 🔥 CONFIGURACIÓN TEMPORAL DE FASE 1
let fase1Temp = {};

async function guardarFase1Config() {
  if (Object.keys(fase1Temp).length === 0) {
    alert("Configura al menos un holograma");
    return;
  }

  const ref = doc(db, "config", "restricciones");

  await setDoc(ref, {
    fase1Config: fase1Temp
  }, { merge: true });

  await guardarHistorial({
    tipo: "config",
    valor: "fase1 actualizada"
  });

  alert("Fase 1 guardada correctamente");
}
  
  
function setFase1(holo, tipo) {
  const key = `${holo}-${tipo}`;

  if (fase1Temp[holo] && fase1Temp[holo].tipo === tipo) {
    delete fase1Temp[holo];
  } else {
    fase1Temp[holo] = { tipo };
  }

  // 🔥 pintar botones activos
  document.querySelectorAll("[data-fase1]").forEach(btn => {
    const k = btn.dataset.fase1;
    const [h, t] = k.split("-");

    const activo = fase1Temp[h]?.tipo === t;
    btn.classList.toggle("activo", activo);
  });

  // 🔥 activar botón guardar
  const btnGuardar = document.querySelector("[data-guardar-fase1]");
  if (btnGuardar) {
    btnGuardar.classList.toggle("activo", Object.keys(fase1Temp).length > 0);
  }

  console.log("Fase1Temp:", fase1Temp);
}


  async function limpiarHistorial() {
  const confirmar = confirm("¿Seguro que quieres borrar el historial?");

  if (!confirmar) return;

  const ref = doc(db, "config", "restricciones");

  await setDoc(ref, {
    historial: []
  }, { merge: true });

  renderHistorial();
}

async function anunciarFase1Manana() {
  const confirmar = confirm("¿Anunciar Fase 1 para mañana?");

  if (!confirmar) return;

  const ref = doc(db, "config", "restricciones");
  const snap = await getDoc(ref);

  let data = snap.exists() ? snap.data() : {};
  let restricciones = data.restricciones || {};

  // 🔥 CONFIGURACIÓN FASE 1 (puedes ajustarla)
  const manana = data.fase1Config || {};

if (Object.keys(manana).length === 0) {
  alert("Primero guarda una configuración de Fase 1");
  return;
}

  await setDoc(ref, {
    restricciones: {
      ...restricciones,
      manana: manana
    }
  }, { merge: true });

  await guardarHistorial({
    tipo: "mañana",
    valor: "fase1"
  });

  renderBotones();
}

async function cancelarManana() {
  const confirmar = confirm("¿Cancelar contingencia de mañana?");
  if (!confirmar) return;

  const ref = doc(db, "config", "restricciones");

  await setDoc(ref, {
    restricciones: {
      manana: null
    }
  }, { merge: true });

  await guardarHistorial({
    tipo: "mañana",
    valor: "cancelado"
  });

  renderBotones();
}
  
window.setModo = setModo;
window.setHoyHolo = setHoyHolo;
  window.setHoyColor = setHoyColor;
window.setMananaHolo = setMananaHolo;
window.resetHoy = resetHoy;
window.resetManana = resetManana;
window.limpiarHistorial = limpiarHistorial;
window.anunciarFase1Manana = anunciarFase1Manana;
window.cancelarManana = cancelarManana;
window.guardarFase1Config = guardarFase1Config;
window.setFase1 = setFase1;
window.guardarFase1Config = guardarFase1Config;

pedirPassword();

setTimeout(() => {
  renderBotones();
  renderHistorial();
}, 1000);

setInterval(cargarModo, 3000);
</script>

</body>
</html>
